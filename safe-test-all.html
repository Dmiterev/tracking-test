<!DOCTYPE html>
<html>
<head><title>🔓 Что МОЖЕТ украсть трекер</title>
<meta charset="UTF-8">
<style>
    body { font-family: Arial; max-width: 900px; margin: 50px auto; padding: 20px; }
    .stolen { 
        background: linear-gradient(90deg, #ef4444, #dc2626); 
        color: white; 
        padding: 25px; 
        border-radius: 15px; 
        margin: 20px 0;
        box-shadow: 0 10px 25px rgba(239,68,68,0.4);
    }
    .test { border: 2px solid #3b82f6; padding: 20px; margin: 20px 0; border-radius: 12px; }
    button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .profile { background: #1f2937; color: #60a5fa; padding: 20px; border-radius: 10px; font-family: monospace; }
</style>
</head>
<body>
<h1>🔓 Что МОЖЕТ украсть с ВАШЕГО компьютера</h1>

<div class="test">
    <h2>🕵️ Запустить ПОЛНЫЙ аудит</h2>
    <button onclick="stealEverything()">🚨 Украсть ВСЕ данные</button>
    <div id="stolen-data">Нажмите кнопку...</div>
</div>

<script>
// 🔓 ФУНКЦИЯ "УКРАДИ ВСЁ" — показывает реальные PII
function stealEverything() {
    // 1️⃣ БАЗОВЫЕ ДАННЫЕ (любой сайт)
    const basic = {
        '📍 IP адрес': '94.25.123.45 (Москва, Ростелеком)',
        '👤 User-Agent': navigator.userAgent.slice(0,80) + '...',
        '🌍 Часовой пояс': Intl.DateTimeFormat().resolvedOptions().timeZone,
        '📱 Язык': navigator.language,
        '🖥️ Разрешение экрана': `${screen.width}x${screen.height}`
    };

    // 2️⃣ FINGERPRINT (78% уникальных)
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = '16px Arial';
    ctx.fillText('STOLEN DATA', 10, 25);
    const fingerprint = btoa(canvas.toDataURL()).slice(0,16);

    // 3️⃣ СИМУЛЯЦИЯ украденного профиля
    const profile = {
        '🆔 Уникальный ID': fingerprint,
        '💰 Интересы': 'спорт, Nike, Москва',
        '💳 Цена товаров': 'повышенная (дискриминация)',
        '📧 Email (угадан)': 'user@mail.ru',
        '📞 Телефон (угадан)': '+7 (9xx) xxx-xx-xx'
    };

    // ✅ ВЫВОД ВСЕГО, ЧТО МОГУТ УКРАСТЬ
    document.getElementById('stolen-data').innerHTML = `
        <div class="stolen">
            <h2>🚨 УКРАДЕНО с вашего компьютера:</h2>
            
            <h3>📋 Базовая информация:</h3>
            ${Object.entries(basic).map(([key,val]) => 
                `<div style="margin:10px 0;"><strong>${key}:</strong> ${val}</div>`
            ).join('')}
            
            <h3>🖐️ Ваш уникальный отпечаток:</h3>
            <div class="profile">
                <strong>User ID:</strong> <span style="color:#60a5fa;font-size:20px;">${fingerprint}</span><br>
                Canvas hash: ${canvas.toDataURL().slice(0,40)}...
            </div>
            
            <h3>🎯 Профиль, который создадут:</h3>
            ${Object.entries(profile).map(([key,val]) => 
                `<div style="margin:10px 0;"><strong>${key}:</strong> ${val}</div>`
            ).join('')}
            
            <div style="background:#1f2937;color:#f87171;padding:15px;border-radius:10px;margin-top:20px;">
                <h4>⚠️ РИСКИ для ВАС:</h4>
                <ul style="margin:0;padding-left:20px;">
                    <li>Персональная реклама Nike по завышенной цене</li>
                    <li>Phishing: "Скидка для постоянных клиентов sport.com"</li>
                    <li>Профилирование: "Москвич, спорт, средний доход"</li>
                    <li>Невозможно спрятаться (incognito бесполезен)</li>
                </ul>
            </div>
        </div>
    `;
}
</script>
</body>
</html>
